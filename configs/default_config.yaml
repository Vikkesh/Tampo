environment:
  # System Configuration
  system:
    num_edge_servers: 3
    num_users: 1
    time_step: 0.1  # seconds
    max_steps: 100
    
  # Computing Resources
  computing:
    cloud_freq: 10000000000.0  # Hz
    edge_freq: [5000000000.0, 5000000000.0, 5000000000.0]  # Hz per server
    local_freq: 1000000000.0  # Hz
    
    # CPU cycles per bit
    cloud_cycles_per_bit: 1000
    edge_cycles_per_bit: 1000
    local_cycles_per_bit: 1000

  # Energy Parameters (Watts)
  energy:
    cloud_power_tx: 0.5
    edge_power_tx: 0.3
    local_power: 0.1
    kappa: 1.0e-23  # Effective switched capacitance (scaled so local energy ≈ same order as transmission energy)

  # Network Parameters
  network:
    bandwidth_up: 20000000.0  # Hz
    bandwidth_down: 20000000.0  # Hz
    noise_power: 1.0e-13  # Watts
    
    # Rayleigh fading parameters
    rayleigh_var: 1.0
    path_loss_a: 35
    path_loss_b: 133.6
    antenna_gain: 0
    shadow_fading: 8
    noise_dBm: -174

  # Task Parameters
  tasks:
    task_size_range: [1000000.0, 10000000.0]  # bits
    task_cycles_range: [1000000000.0, 10000000000.0]  # cycles
    task_type: 'dag'  # 'dag' or 'independent'
  
  # Reward Configuration
  reward:
    congestion_penalty_weight: 0.4
    comm_penalty_weight: 0.3
    improvement_baseline: 'local'
    
    # DAG task parameters
    dag:
      num_tasks_range: [10, 30]
      dependency_prob: 0.3
      
    # Poisson arrival
    poisson_lambda: 0.5

# Training Parameters
training:
  batch_size: 32
  num_episodes: 1000
  learning_rate: 3.0e-4
  gamma: 0.99
  
  # Meta-learning
  meta_batch_size: 8
  num_meta_iterations: 300
  inner_lr: 0.005   # reduced for stable MAML inner-loop adaptation
  inner_steps: 5    # more steps → better per-task adaptation signal
  
  # Threshold-based communication
  hypervolume_threshold: 0.7
  moving_average_window: 50

# Algorithm-specific configs
algorithms:
  heft:
    enabled: true
  
  pso:
    enabled: true
    num_particles: 50
    max_iterations: 100
    w: 0.7  # inertia
    c1: 1.5  # cognitive
    c2: 1.5  # social
    
  ga:
    enabled: true
    population_size: 100
    num_generations: 100
    crossover_rate: 0.8
    mutation_rate: 0.1
    
  gmorl:
    enabled: true
    hidden_dims: [256, 256]
    
  tampo:
    enabled: true
    hidden_dims: [256, 256]
    num_attention_heads: 8
    encoder_type: 'gcn'  # Options: 'lstm', 'gcn', 'gat'
    meta_learning_rate: 5.0e-5  # reduced: second-order MAML gradients are high-variance
    num_meta_iterations: 100
    meta_batch_size: 10

    # GAT encoder parameters (used only when encoder_type: 'gat')
    num_gat_heads: 4        # attention heads for GATv2Conv layer 1
    gat_hidden_dim: 16      # intermediate dim = num_gat_heads * (gat_hidden_dim // num_gat_heads)
    gat_add_self_loops: true  # match GCNConv default for fair comparison
